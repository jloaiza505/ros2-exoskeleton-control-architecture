/**:
  ros__parameters:
    fused_state_topic: /exo/state/fused
    gait_phase_topic: /exo/gait/phase
    mode_state_topic: /exo/system/mode
    calibration_status_topic: /exo/system/calibration_status
    user_message_topic: /exo/system/user_message
    set_mode_service: /exo/system/set_mode
    run_full_calibration_service: /exo/system/run_full_calibration
    validate_calibration_service: /exo/system/validate_calibration
